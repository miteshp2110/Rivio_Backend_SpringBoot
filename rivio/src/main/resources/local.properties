spring.application.name=rivio

server.port=8081
server.servlet.context-path=/api


spring.datasource.url=jdbc:mysql://localhost:3306/rivio_hr_db?serverTimezone=UTC&useSSL=false
spring.datasource.username=root
spring.datasource.password=your_mysql_password_here
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver


spring.jpa.hibernate.ddl-auto=none

spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect


rivio.app.jwtSecret=your_super_secret_key_for_rivio_hr_system_do_not_share_sdoo2
rivio.app.jwtExpirationMs=86400000

